id: e2e-no-skipped-scenarios
name: No Skipped Gherkin Scenarios
description: Gherkin feature files must not contain @skip or @wip tags
tags: [bdd, e2e]

condition:
  languages: [python, go, typescript, java]
  features: [bdd]

post_init:
  output_file: test_e2e_no_skipped_scenarios
  prompt: |
    Generate an architecture test that forbids @skip and @wip tags in Gherkin feature files.

    The rule: feature files are the canonical specification of expected behaviour. Scenarios
    tagged @skip or @wip are not being verified and represent gaps in coverage. These tags
    must not appear in committed feature files. The only permitted exclusion is @internal
    (for scenarios requiring internal/private API state that no sequence of public API calls
    can produce).

    Tags to detect: @skip, @wip, @xfail, @pending (any skip-like tag except @internal)

    Before generating, examine the project context to determine:
    - The primary language and test framework
    - Where feature files are located (typically a features/ or specs/ directory, or
      within test directories — infer from the feature_files list in the project context)
    - Any project-specific tags that function as skip markers

    Generate the architecture test in the same language as the project.
    Scan all .feature files found in the project.

    The architecture test should:
    - Collect all violations before failing
    - Report: filename:line_number — tag found (@skip/@wip/etc.)
    - Fail with a summary

    Name the output file appropriately for the language.
    Derive feature file locations from the project context provided.
  claude_md_section: |
    ## No Skipped Gherkin Scenarios

    Feature files must not contain `@skip`, `@wip`, `@xfail`, or `@pending` tags.

    ### Why

    A feature file is the specification of the system's intended behaviour. A skipped scenario
    is an unverified claim — it says "the system should do X" while simultaneously telling the
    test runner not to check. Over time, skipped scenarios accumulate and the gap between the
    specification and the verified behaviour widens silently. Teams lose confidence in what is
    actually tested.

    The discipline is: if the scenario cannot run today, do not commit it until it can.

    ### Forbidden tags

    ```gherkin
    @skip
    @wip
    @xfail
    @pending
    ```

    Any tag whose effect is to cause the scenario runner to skip or suppress the scenario
    is forbidden.

    ### The only permitted exclusion: @internal

    `@internal` is reserved for scenarios that require system state unreachable via the
    public API — for example, a resource already in a transient `DELETING` state that cannot
    be reproduced by any sequence of public API calls.

    ```gherkin
    @internal
    Scenario: deletion fails when resource is already deleting
      Given a table is in a DELETING state
      When I delete the table
      Then I receive a ResourceInUse error
    ```

    `@internal` scenarios are still executed — they require a specialised fixture to
    manufacture the state. They are not a mechanism to skip a scenario indefinitely.

    ### What to do instead of skipping

    | Situation | Resolution |
    |---|---|
    | Scenario not yet implemented | Do not commit it until implemented |
    | Flaky scenario | Fix the flakiness or remove the scenario |
    | Hard-to-set-up infrastructure | Solve the infrastructure problem |
    | Genuinely unreachable state | Use `@internal` with a manufacturing fixture |

post_propose:
  insert: before:Implementation
  tasks:
    - "Run `pytest tests/architecture/test_e2e_no_skipped_scenarios.py -v` — must pass before\
      \ implementation is complete"
    - "Do not remove, skip, or modify the e2e-no-skipped-scenarios architecture test without\
      \ explicit user approval"
