id: no-bare-except
name: No Bare Except / Catch-All Error Handling
description: Error handlers must always specify the exception or error type — no catch-all handlers
tags: [general]

condition:
  languages: [python, go, typescript, java]

post_init:
  output_file: test_no_bare_except
  prompt: |
    Generate an architecture test that forbids untyped catch-all error handlers in the
    project's source code (not tests).

    The rule varies by language but the intent is the same — always name what you are catching:
    - Python: forbid bare `except:` with no exception type
    - Go: not applicable (Go uses explicit error values, not exceptions) — skip this standard
    - TypeScript/JavaScript: forbid `catch(e)` where e is never narrowed or typed, or
      empty catch blocks `catch {}` — flag catch blocks where the error is ignored entirely
    - Java: forbid `catch (Exception e)` or `catch (Throwable e)` at the top level where
      a more specific type would be appropriate; always flag empty catch blocks

    Before generating, examine the project context to determine:
    - The primary language
    - Whether the language uses exceptions or error values
    - The actual source directories to scan (src/, app/, lib/, cmd/, or similar)
    - The test framework to use for the architecture test itself

    If the language does not use exceptions (e.g. Go), generate a test that passes
    immediately with a skip message explaining why the check is not applicable.

    Generate the architecture test in the same language as the project.
    Use static analysis appropriate for that language to detect violations.

    The architecture test should:
    - Scan source directories only, not test directories
    - Collect ALL violations before failing
    - Report each as: filename:line_number — bare/untyped handler found
    - Fail with a summary

    Name the output file appropriately for the language.
    Derive source directories from the project context provided.
  claude_md_section: |
    ## No Bare / Catch-All Error Handling

    Always name the specific exception or error type you are handling. Never use a bare
    `except:` or an empty catch block.

    ### Why

    A bare `except` catches everything, including `KeyboardInterrupt`, `SystemExit`, and
    programming errors like `AttributeError`. This hides bugs, makes debugging harder, and
    can leave the program in an inconsistent state. Naming the exception type makes the
    intent explicit and limits the handler to the errors it was designed for.

    ### Python

    ```python
    # Bad — catches everything including programming errors
    try:
        do_something()
    except:
        pass

    # Bad — too broad
    try:
        do_something()
    except Exception:
        pass

    # Good — specific type
    try:
        do_something()
    except ValueError as e:
        handle(e)

    # Good — multiple specific types
    try:
        do_something()
    except (KeyError, TypeError) as e:
        log.warning("unexpected input: %s", e)
        raise
    ```

    ### TypeScript

    ```typescript
    // Bad — error is swallowed
    try {
        doSomething()
    } catch {}

    // Bad — error is ignored
    try {
        doSomething()
    } catch (e) {
        // nothing
    }

    // Good — error is handled or re-raised
    try {
        doSomething()
    } catch (e) {
        if (e instanceof ValidationError) handle(e)
        else throw e
    }
    ```

    ### Acceptable patterns

    - Re-raising after logging: `except Exception as e: log.error(...); raise`
    - Top-level application error boundaries where catching broadly is intentional — document with a comment
    - Go: not applicable (Go uses explicit error return values, not exceptions)

post_propose:
  insert: before:Implementation
  tasks:
    - "Run `pytest tests/architecture/test_no_bare_except.py -v` — must pass before\
      \ implementation is complete"
    - "Do not remove, skip, or modify the no-bare-except architecture test without explicit\
      \ user approval"
