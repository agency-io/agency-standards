id: no-session-helpers-in-constants
name: No Session Helpers in Constants
description: Functions that take a session/client as their first parameter belong in client.py, not constants.py
tags: [bdd]

condition:
  languages: [python, go, typescript, java]
  features: [bdd]

post_init:
  output_file: test_no_session_helpers_in_constants
  prompt: |
    Generate an architecture test that enforces correct separation between constants.py and client.py
    in BDD step definition packages.

    The rule: `constants.py` (or equivalent constants file) in step packages must only contain:
    - String/number constants (TEST_*, INT_*, resource name prefixes)
    - Pure functions that take no session/client parameter

    Functions that take a session or API client as their first parameter are "session helpers"
    and belong in `client.py` (or the TestClient class). Mixing these into constants.py makes
    the file do two unrelated things and breaks the navigability convention.

    Session helper indicators — first parameter names that signal a session helper:
    - Python: `lws_session`, `aws_client`, `session`, `client`, `boto_client`
    - TypeScript: `session`, `client`
    - Java: session/client parameter types

    Before generating, examine the project context to determine:
    - The primary language and BDD framework
    - Whether the project uses a constants.py pattern (infer from sample files)
    - The actual step package directories that contain constants files
    - The exact parameter naming convention used in this project's helpers (infer from samples)

    Generate the architecture test in the same language as the project.
    Use AST or string analysis to detect function definitions with session-like first params.

    The architecture test should:
    - Scan all constants.py (or equivalent) files in step directories
    - Flag functions whose first parameter matches session helper patterns
    - Collect all violations before failing
    - Report: filename — function "X" has session parameter, belongs in client.py
    - Fail with a summary

    Name the output file appropriately for the language.
    Derive step directories from the project context provided.
  claude_md_section: |
    ## No Session Helpers in Constants

    `constants.py` holds constants and pure helper functions only. Any function that accepts
    a session or client object as a parameter belongs in `client.py`, inside the TestClient class.

    ### Why

    `constants.py` and `client.py` have distinct responsibilities. Mixing session-dependent
    helpers into `constants.py` breaks that contract — you end up with a file that does two
    unrelated things, and developers cannot predict where to find session logic.

    ### What belongs where

    ```python
    # constants.py — constants and pure helpers ONLY
    TEST_TABLE = "e2e-create-table"
    TEST_QUEUE = "e2e-send-message"

    def build_item(pk: str) -> dict:    # pure function, no session — OK here
        return {"pk": pk, "sk": "ITEM"}

    def make_tag(key: str, value: str) -> dict:  # pure — OK here
        return {"Key": key, "Value": value}
    ```

    ```python
    # constants.py — NOT OK
    def create_table(lws_session, name=TEST_TABLE):  # session param → move to client.py
        lws_session.dynamodb.create_table(name)

    def wait_for_active(aws_client, table_name):     # client param → move to client.py
        aws_client.get_waiter("table_exists").wait(TableName=table_name)
    ```

    ```python
    # client.py — where session helpers belong
    class DynamodbTestClient:
        def __init__(self, lws_session):
            self._session = lws_session

        def create_table(self, name=TEST_TABLE):
            self._session.dynamodb.create_table(name)

        def wait_for_active(self, table_name):
            ...
    ```

    ### Signal to look for

    Any function in `constants.py` whose first parameter is named `session`, `client`,
    `lws_session`, `boto_client`, or similar — move it to the TestClient class.

post_propose:
  insert: before:Implementation
  tasks:
    - "Run `pytest tests/architecture/test_no_session_helpers_in_constants.py -v` — must\
      \ pass before implementation is complete"
    - "Do not remove, skip, or modify the no-session-helpers-in-constants architecture\
      \ test without explicit user approval"
