id: e2e-bdd-pattern
name: E2E Tests Use BDD Pattern
description: E2E test runner files must use the BDD scenarios() wiring pattern, not class-based test structures
tags: [bdd, e2e]

condition:
  languages: [python, go, typescript, java]
  features: [bdd]

post_init:
  output_file: test_e2e_bdd_pattern
  prompt: |
    Generate an architecture test that enforces BDD wiring in E2E test files.

    The rule has two parts:
    1. Every E2E test runner file must wire in Gherkin scenarios — for pytest-bdd this means
       calling `scenarios()`, for Cucumber-based frameworks this means the runner references
       the feature files
    2. E2E test files must NOT contain Test* classes — E2E tests use BDD (Given/When/Then),
       not class-based unit-test structures

    Before generating, examine the project context to determine:
    - The primary language and BDD framework in use (pytest-bdd, behave, Godog, Cucumber.js,
      Cucumber Java, etc.) — infer from build file and sample test files
    - The location of E2E test files (e2e/ directory or equivalent)
    - The naming pattern for E2E runner files (test_scenarios.py, *_test.go, *.feature, etc.)
    - What the BDD wiring call looks like for this framework

    Generate the architecture test in the same language as the project.

    The architecture test should:
    - Scan the e2e test directory
    - Flag runner files that lack the BDD wiring call
    - Flag any Test* class definitions in e2e files
    - Collect all violations before failing
    - Report: filename — missing BDD wiring / unexpected test class found
    - Fail with a summary

    Name the output file appropriately for the language.
    Derive e2e directories from the project context provided.
  claude_md_section: |
    ## E2E Tests Use BDD Pattern

    E2E tests must use Gherkin BDD (Given/When/Then), not class-based test structures:
    - Every E2E test runner file must wire in feature scenarios (e.g. `scenarios()` in pytest-bdd)
    - E2E files must not define Test* classes
    - Step definitions live in given/, when/, then/ directories

    Unit tests use AAA. E2E tests use BDD. These are not interchangeable.

post_propose:
  insert: before:Implementation
  tasks:
    - "Run `pytest tests/architecture/test_e2e_bdd_pattern.py -v` — must pass before\
      \ implementation is complete"
    - "Do not remove, skip, or modify the e2e-bdd-pattern architecture test without explicit\
      \ user approval"
