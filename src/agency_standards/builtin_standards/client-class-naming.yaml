id: client-class-naming
name: TestClient Class Naming
description: client.py in step packages must define exactly one PascalCaseTestClient class named after the service
tags: [bdd]

condition:
  languages: [python, go, typescript, java]
  features: [bdd]

post_init:
  output_file: test_client_class_naming
  prompt: |
    Generate an architecture test that enforces naming and structure of TestClient classes
    in BDD step packages.

    The rule: each `client.py` (or equivalent) file in a step package must:
    1. Define exactly one class
    2. That class must be named `<PascalCaseService>TestClient`
       - The service name comes from the parent step package directory name
       - The directory name is converted from snake_case to PascalCase
       - Examples: `dynamodb/` → `DynamodbTestClient`, `ssm/` → `SsmTestClient`,
         `event_bridge/` → `EventBridgeTestClient`
    3. The class must be the only public class in the file

    Before generating, examine the project context to determine:
    - The primary language and BDD framework
    - Where client.py files exist in the step directory structure (infer from project context)
    - The actual service directory names used in this project
    - Whether the project uses a different TestClient naming convention (infer from samples
      and adapt accordingly)

    Generate the architecture test in the same language as the project.

    The architecture test should:
    - Find all client.py files in step/e2e directories
    - Check that each defines exactly one class with the correct PascalCase name
    - Collect all violations before failing
    - Report: filepath — expected class "DynamodbTestClient" but found ["X", "Y"]
    - Fail with a summary

    Name the output file appropriately for the language.
    Derive step directories from the project context provided.
  claude_md_section: |
    ## TestClient Class Naming

    Each `client.py` in a step package defines exactly one class named after the service:

    ```
    e2e/dynamodb/client.py       → class DynamodbTestClient
    e2e/ssm/client.py            → class SsmTestClient
    e2e/event_bridge/client.py   → class EventBridgeTestClient
    ```

    The class encapsulates all session/SDK helpers for that service. Step files call
    methods on this class rather than making SDK calls directly.

post_propose:
  insert: before:Implementation
  tasks:
    - "Run `pytest tests/architecture/test_client_class_naming.py -v` — must pass before\
      \ implementation is complete"
    - "Do not remove, skip, or modify the client-class-naming architecture test without\
      \ explicit user approval"
