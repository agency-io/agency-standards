id: no-magic-strings
name: No Magic Strings in Assertions
description: Assertion comparisons must use named expected/actual variables, not inline literals
tags: [general]

condition:
  languages: [python, go, typescript, java]

post_init:
  output_file: test_no_magic_strings
  prompt: |
    Generate an architecture test that forbids magic string or number literals directly
    inside assertion statements in test files.

    The rule: whenever an assertion compares two values, neither side should be a raw string
    or number literal. The value must be extracted to a named variable that makes intent clear.

    Naming convention for the variables:
    - Python: expected_* and actual_*
    - Go: expected* and got* (or want* and got*)
    - TypeScript: expected* and actual*
    - Java: expected* and actual*

    Before generating, examine the project context to determine:
    - The primary language
    - The test framework and assertion style in use (assert statements, self.assertEqual,
      t.Equal, expect().toBe(), assertEquals, etc.) — infer from sample test files
    - The test file naming pattern and directories
    - Whether the project mixes assertion styles across files

    Exceptions that are allowed (do NOT flag):
    - Null/nil/None checks (assert x is None, assertNull(x), etc.)
    - Boolean truthiness checks (assert x, assertTrue(x))
    - Length/count checks where the number is obvious (assert len(x) == 2)
    - Key/field presence checks ("key" in result, hasOwnProperty, containsKey)

    Generate the architecture test in the same language as the project.
    Use static analysis appropriate for that language to detect violations.

    The architecture test should:
    - Collect all violations before failing
    - Report: filename:line_number — test_name — literal value found in assertion
    - Fail with a clear summary

    Name the output file appropriately for the language.
    Derive test directories and naming patterns from the project context provided.
  claude_md_section: |
    ## No Magic Strings in Assertions

    Extract comparison values to named variables before asserting:

    ```python
    # Bad
    assert account["status"] == "active"

    # Good
    expected_status = "active"
    actual_status = account["status"]
    assert actual_status == expected_status, f"Expected {expected_status!r} but got {actual_status!r}"
    ```

    The same rule applies in Go (want/got), TypeScript (expected/actual), and Java (expected/actual).

post_propose:
  insert: before:Implementation
  tasks:
    - "Run `pytest tests/architecture/test_no_magic_strings.py -v` — must pass before\
      \ implementation is complete"
    - "Do not remove, skip, or modify the no-magic-strings architecture test without\
      \ explicit user approval"
