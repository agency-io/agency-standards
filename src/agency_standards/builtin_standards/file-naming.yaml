id: file-naming
name: Test File Naming
description: Test files must follow a consistent naming pattern describing what is tested and under what condition
tags: [general]

condition:
  languages: [python, go, typescript, java]

post_init:
  output_file: test_file_naming
  prompt: |
    Generate an architecture test that enforces test file naming conventions.

    The goal: test file names should describe both WHAT is being tested and UNDER WHAT CONDITION,
    not just mirror the source module name.

    Before generating, examine the project context to determine:
    - The primary language
    - The test framework and its required naming conventions:
      - Python: test_*.py or *_test.py
      - Go: *_test.go (required by the toolchain — naming within that is the concern)
      - TypeScript: *.test.ts, *.spec.ts
      - Java: *Test.java, *Spec.java
    - The actual naming pattern used in existing test files — infer from sample files
    - The test directories
    - Support files that should be excluded from the check (conftest.py, __init__.py,
      constants.py, client.py, helpers files, step definition files, fixtures, etc.)

    Flag files where the name is too generic — where the name describes a whole module rather
    than a specific area or operation. Generic names to flag (adapted to the language's convention):
    - test_models, test_utils, test_helpers, test_main, test_core, models_test, utils_test
    - ModelsTest.java, UtilsTest.java
    - models.test.ts, utils.test.ts

    Do NOT flag:
    - Support/fixture/configuration files
    - Files that follow the project's pattern with a clear subject and scenario
    - Files that have a single focused subject even without an explicit scenario suffix

    Generate the architecture test in the same language as the project.
    Use file system traversal appropriate for that language.

    The architecture test should:
    - Collect all violations before failing
    - Report: filepath — reason (too generic / wrong pattern)
    - Fail with a summary

    Name the output file appropriately for the language.
    Derive everything — directories, patterns, exclusions — from the project context provided.
  claude_md_section: |
    ## Test File Naming

    Test file names must describe both **what** is being tested and **under what condition**.
    A name that mirrors the source module (`test_models.py`) tells you nothing about what
    scenario or operation is covered.

    ### Why

    A well-named test file is findable without opening it. When a test fails in CI, the file
    name in the output should immediately tell you which operation broke and in what context.
    Generic names force developers to search.

    ### Pattern

    ```
    test_<subject>_<operation>.py
    test_<subject>_when_<condition>.py
    test_<subject>_<operation>_when_<condition>.py
    ```

    ### Examples

    | Bad (too generic) | Good (specific) |
    |---|---|
    | `test_models.py` | `test_account_repository_create.py` |
    | `test_utils.py` | `test_date_formatter_when_timezone_missing.py` |
    | `test_handlers.py` | `test_order_handler_when_payment_fails.py` |
    | `ModelsTest.java` | `AccountRepositoryCreateTest.java` |
    | `utils.test.ts` | `date-formatter-empty-timezone.test.ts` |

    ### Exemptions

    These support files are excluded from the naming check:
    - `conftest.py`, `__init__.py` — test infrastructure
    - `constants.py`, `client.py` — BDD step helpers
    - `fixtures.py`, `factories.py` — test data builders
    - Step definition files in `given/`, `when/`, `then/` directories

post_propose:
  insert: before:Implementation
  tasks:
    - "Run `pytest tests/architecture/test_file_naming.py -v` — must pass before implementation\
      \ is complete"
    - "Do not remove, skip, or modify the file-naming architecture test without explicit\
      \ user approval"
