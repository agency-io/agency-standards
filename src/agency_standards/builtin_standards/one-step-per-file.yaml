id: one-step-per-file
name: One Step Per File
description: Each file in given/, when/, then/ directories must define exactly one step function
tags: [bdd]

condition:
  languages: [python, go, typescript, java]
  features: [bdd]

post_init:
  output_file: test_one_step_per_file
  prompt: |
    Generate an architecture test that enforces one step function per step definition file.

    The rule: each file in a given/, when/, or then/ directory must define exactly one
    decorated step function. Having multiple steps in one file:
    - Makes it hard to find which file defines a given step
    - Encourages copy-paste between related steps
    - Obscures the relationship between file name and step name

    Step function decorators by framework:
    - Python pytest-bdd: `@given`, `@when`, `@then`
    - Python behave: `@given`, `@when`, `@then`
    - TypeScript Cucumber: `Given(`, `When(`, `Then(`
    - Java Cucumber: `@Given`, `@When`, `@Then`
    - Go Godog: `s.Step(` or `ctx.Step(` (one per file)

    Before generating, examine the project context to determine:
    - The primary language and BDD framework
    - The actual step directory paths (given/, when/, then/ under e2e/ or tests/)
    - Support files to exclude (__init__.py, index.ts, world.ts, hooks files)

    Generate the architecture test in the same language as the project.
    Use string/regex scanning or AST as appropriate.

    The architecture test should:
    - Scan all files in given/, when/, then/ directories
    - Count step decorators per file
    - Flag files with 0 or more than 1 step function
    - Collect all violations before failing
    - Report: filename — N step functions found (expected exactly 1)
    - Fail with a summary

    Name the output file appropriately for the language.
    Derive step directories from the project context provided.
  claude_md_section: |
    ## One Step Per File

    Each file in `given/`, `when/`, `then/` directories must define exactly one step function.

    ### Why

    One step per file, combined with `step-file-name-matches-function`, makes every step
    findable in O(1): you know immediately which file to open. A file with multiple steps
    forces a search, has a generic name that violates the naming convention, and makes it
    harder to update or reuse individual steps.

    ### Good

    ```
    given/a_table_exists.py          → @given("a table exists") def a_table_exists(...)
    given/a_table_is_active.py       → @given("a table is active") def a_table_is_active(...)
    when/i_delete_the_table.py       → @when("I delete the table") def i_delete_the_table(...)
    then/the_table_does_not_exist.py → @then("the table does not exist") def the_table_does_not_exist(...)
    ```

    ### Bad

    ```
    given/table_steps.py  → def a_table_exists(...)
                            def a_table_is_active(...)   ← two steps, wrong
    ```

    ### Acceptable contents alongside the step function

    - Imports
    - Small private helper functions used only by that step (prefix with `_`)
    - The step function's pytest fixture parameters

    If a helper is used by more than one step, it belongs in `constants.py` (if pure)
    or `client.py` (if it uses a session).

post_propose:
  insert: before:Implementation
  tasks:
    - "Run `pytest tests/architecture/test_one_step_per_file.py -v` — must pass before\
      \ implementation is complete"
    - "Do not remove, skip, or modify the one-step-per-file architecture test without\
      \ explicit user approval"
