name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        env:
          TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: git clone --depth 1 "https://x-access-token:${TOKEN}@github.com/${REPO}.git" .

      - name: Install uv
        run: pip install uv

      - name: Build
        run: uv build

      - name: Publish
        run: uv publish
